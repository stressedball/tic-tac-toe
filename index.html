<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <script src="script.js" defer></script>
    <title>TIC TAC TOE</title>
</head>
<body>
    <h1>Tic tac toe</h1>
    <div class="gameboard"></div>
    <div class="container">
        <div class="game">
            <div class="button-start-container">
                <button class="start-game">Start new game?</button>
            </div>
            <div class="first hidden">
                <div class="name-choice">
                    <p class="first message-one">
                        Player number 1, enter your name
                    </p>
                    <p class="first message-two no-opacity">
                        Void isn't allowed
                    </p>
                    <input type="text" class="player-name one">
                </div>
                <button class="player-one-register">Enter</button>
                <div class="symbol-choice">
                    <p class="first message-three">Choose your weapon</p>
                    <p class="first message-four no-opacity">Please choose your weapon</p>
                    <div>
                        <button class="x">X</button>
                        <button class="o">O</button>
                    </div>
                </div>
            </div>
            <div class="second hidden">
                <div class="name-choice">
                    <p class="second message-one">
                        Who'll you challenge?
                    </p>
                    <p class="second message-two no-opacity">Please choose your adversary</p>
                </div>
                <div>
                    <button class="human">A human</button>
                    <button class="cpu">A machine</button>
                </div>
                <div>
                    <button class="human-cpu-choice">
                        Confirm
                    </button>
                </div>
            </div>
            <div class="third hidden">
                <div class="name-choice">
                    <p class="third message-one">
                        Player number 2, enter your name
                    </p>
                    <p class="third message-two no-opacity">
                        Void isn't allowed
                    </p>
                    <input type="text" class="player-name two">
                </div>
                <button class="player-two-register">Enter</button>
                <div class="show-symbol">Player 2 weapon :</div>
            </div>
            <div class="fourth hidden">
                <p class="winner no-opacity">Winner of the round</p>
                <p class="tie-game no-opacity">It's a tie!</p>
            </div>
        </div>
    </div>
    <footer>Made by TS</footer>
</body>
</html>
