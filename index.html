<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <script src="script.js" defer></script>
    <title>TIC TAC TOE</title>
</head>
<body>
    <h1>Tic tac toe</h1>
    <div class="gameboard"></div>
    <div class="container">
        <div class="game">
            <div class="button-start-container">
                <button class="start-game">Start new game?</button>
            </div>
                    <!-- message number 1
                    'player one enter your name and choose your weapon'
                    Message 2
                    'Who'll be player 2?
                    A human or CPU?
                    if human, screen 3
                    'player 2, you've been assigned [weapon 2], what is your name?'
                    if cpu -> do nothing?
                    START GAME -->
            <div class="first hidden">
                <div class="name-choice">
                    <div class="message">
                        Player number 1, enter your name
                    </div>
                    <div class="second-message hidden">
                        Void isn't allowed
                    </div>
                    <input type="text" class="player-name one">
                </div>
                <button class="player-one-register">Enter</button>
                <div class="symbol-choice">
                        <p class="no-margin">Choose your weapon</p>
                        <p class="hidden no-margin">Please choose your weapon</p>
                        <div>
                            <button class="x">X</button>
                            <button class="o">O</button>
                        </div>
                </div>
            </div>
            <div class="second hidden">
                <div class="name-choice">
                    <div class="message">
                        Who'll you challenge?
                    </div>
                    <div class="">
                        <button class="human">A human</button>
                        <button class="cpu">A machine</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer>Made by TS</footer>
</body>
</html>
